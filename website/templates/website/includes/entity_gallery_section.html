{% if gallery_images %}
<section class="cw-entity-section cw-entity-gallery mb-5" aria-label="{{ section_title|default:'Image gallery' }}">
  <div class="d-flex flex-wrap justify-content-between align-items-end gap-2 mb-3">
    <h2 class="h5 fw-bold text-cw-navy mb-0">{{ section_title|default:"Gallery" }}</h2>
    <span class="small text-muted">{{ gallery_images|length }} image{{ gallery_images|length|pluralize }}</span>
  </div>
  <div class="row g-2 g-md-3">
    {% for img in gallery_images %}
    <div class="col-4 col-md-3 col-lg-2">
      <div
        class="cw-entity-gallery-tile rounded-3 shadow-sm"
        style="background-image: url('{{ img.image_url }}');"
        role="img"
        aria-label="{{ img.alt_text|default:'Gallery image' }}"
      ></div>
    </div>
    {% endfor %}
  </div>
</section>
{% endif %}
